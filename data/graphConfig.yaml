# Graph configuration for page relationship visualization
# Local Graph shows connections within a certain depth from the current page (always used)
# Global Graph shows all connections (only on home page when enableGlobalGraph is true)

enableGlobalGraph: false

### Local Graph (used on every page; centered on current page) ###

localGraph:
    enableLegend: false
    enableDrag: true
    enableZoom: true
    depth: 1 # hops from current page (1 = direct inbound/outbound links); set to -1 to show full graph
    scale: 1.2
    repelForce: 1
    linkDistance: 1  # multiplier for link length
    fontSize: 0.6
    opacityScale: 3

### Global Graph ###

globalGraph:
    enableLegend: false
    enableDrag: true
    enableZoom: true
    depth: -1 # set to -1 to show full graph
    scale: 1.4
    repelForce: 1
    linkDistance: 1  # multiplier for link length (base 40px)
    fontSize: 0.5
    opacityScale: 3

### Scoped full graph (section pages with graph.depth: -1 and graph.scope, e.g. /garden) ###

scopedGraph:
    enableLegend: true
    enableDrag: true
    enableZoom: true
    scale: 0.75 # zoom out to fit many nodes in the main content area
    repelForce: 3
    linkDistance: 2.5 # multiplier for link length (base 40px)
    fontSize: 0.38
    opacityScale: 1.25 # faint labels until zoomed in
    collidePadding: 5 # extra space around nodes (reduces overlap)

### For all graphs ###

paths:
  - /blog: "#3b82f6"
  - /garden: "#10b981"
  - /resources: "#f59e0b"

# Garden item node colors (matches usefulness badges: green / info / warning / error)
usefulness:
  adopt: "#16a34a"
  trial: "#2563eb"
  assess: "#ca8a04"
  hold: "#dc2626"
